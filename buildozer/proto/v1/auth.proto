syntax = "proto3";

package buildozer.proto.v1;

import "buildozer/proto/v1/vocabulary.proto";

option go_package = "github.com/Manu343726/buildozer/buildozer/proto/v1";

// RequestMetadata includes authentication and authorization info for all requests
message RequestMetadata {
  // Client ID (peer ID of requester)
  string client_id = 1;

  // Auth token (TODO: implement real TLS/OAuth; for now, dummy "token")
  string auth_token = 2;

  // Request timestamp (unix milliseconds) for replay attack prevention
  TimeStamp timestamp = 3;

  // Request signature (TODO: implement HMAC or RSA signature)
  string signature = 4;

  // API version (for backward compatibility)
  string api_version = 5;
}

// AuthResponse is the result of authentication/authorization
message AuthResponse {
  // Is the request authenticated?
  bool authenticated = 1;

  // Is the request authorized for the requested action?
  bool authorized = 2;

  // If not authenticated/authorized, why?
  string error_message = 3;

  // Timestamp
  TimeStamp timestamp = 4;
}
