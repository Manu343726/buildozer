syntax = "proto3";

package buildozer.proto.v1;

import "buildozer/proto/v1/job.proto";
import "buildozer/proto/v1/network_messages.proto";
import "buildozer/proto/v1/runtime.proto";
import "buildozer/proto/v1/vocabulary.proto";

option go_package = "github.com/Manu343726/buildozer/buildozer/proto/v1";

// JobService handles job submission, execution, and status queries
service JobService {
  // SubmitJob submits a job for execution in the network
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);

  // GetJobStatus queries the status of a job (single query)
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);

  // WatchJobStatus streams job status updates in real-time
  rpc WatchJobStatus(WatchJobStatusRequest) returns (stream WatchJobStatusResponse);

  // CancelJob cancels a job and optionally its dependents
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
}

// ExecutorService handles job execution and progress streaming
service ExecutorService {
  // ExecuteJob executes a job and streams progress back
  rpc ExecuteJob(ExecuteJobRequest) returns (stream ExecuteJobResponse);

  // FetchArtifact streams artifact data from this peer's cache
  rpc FetchArtifact(FetchArtifactRequest) returns (stream FetchArtifactResponse);
}

// PeerService handles peer discovery, announcements, and network queries
service PeerService {
  // AnnounceSelf registers peer on network (mDNS or peer-to-peer)
  rpc AnnounceSelf(AnnounceSelfRequest) returns (AnnounceSelfResponse);

  // QueryCapabilities returns current peer capabilities (load, runtimes, cache status)
  rpc QueryCapabilities(QueryCapabilitiesRequest) returns (QueryCapabilitiesResponse);

  // QueryCache asks: do you have this artifact?
  rpc QueryCache(QueryCacheRequest) returns (QueryCacheResponse);

  // BroadcastCacheAnnouncement announces a newly cached artifact to all peers
  rpc BroadcastCacheAnnouncement(BroadcastCacheAnnouncementRequest) returns (BroadcastCacheAnnouncementResponse);

  // BroadcastError broadcasts a job error to all peers (for quorum sync)
  rpc BroadcastError(BroadcastErrorRequest) returns (BroadcastErrorResponse);
}

// SchedulerService handles quorum-based job scheduling
service SchedulerService {
  // ProposeSchedule proposes scheduling a job to a target peer
  // Other peers vote; if all agree, job is scheduled
  rpc ProposeSchedule(ProposeScheduleRequest) returns (ProposeScheduleResponse);

  // CommitSchedule finalizes a scheduling decision
  rpc CommitSchedule(CommitScheduleRequest) returns (CommitScheduleResponse);
}

// Request/Response message types

// GetJobStatusRequest queries job status
message GetJobStatusRequest {
  // Job ID
  string job_id = 1;

  // Optional: only return if status changed since this timestamp
  TimeStamp since = 2;
}

// JobStatus is returned when submitting a job
message JobStatus {
  // Job ID
  string job_id = 1;

  // Client ID of the client who received the job submission
  string submitter_id = 2;

  // Submission timestamp
  TimeStamp submitted_at = 3;

  // Is the job accepted?
  bool accepted = 4;

  // If not accepted, why?
  string error_message = 5;
}

// CancelJobRequest requests job cancellation
message CancelJobRequest {
  // Job ID
  string job_id = 1;

  // Cancellation reason
  string reason = 2;

  // Should dependent jobs also be cancelled?
  bool cancel_dependents = 3;
}

// CancelJobResponse confirms cancellation
message CancelJobResponse {
  // Job ID
  string job_id = 1;

  // Was cancellation successful?
  bool cancelled = 2;

  // If not successful, why?
  string error_message = 3;

  // Number of dependent jobs cancelled (if requested)
  uint32 dependents_cancelled = 4;
}

// ExecuteJobRequest contains a job to execute
message ExecuteJobRequest {
  // The job to execute (includes all inputs)
  Job job = 1;
}

// AnnounceSelfResponse is returned when a peer announces itself
message AnnounceSelfResponse {
  // Peer ID assigned (or confirmed)
  string peer_id = 1;

  // Was announcement successful?
  bool accepted = 2;

  // Error message if not accepted
  string error_message = 3;

  // List of known peers in the network
  repeated PeerInfo known_peers = 4;
}

// PeerInfo is a brief record of a known peer
message PeerInfo {
  // Peer ID
  string peer_id = 1;

  // gRPC endpoint
  ApiUri grpc_uri = 2;

  // REST API endpoint (if available)
  ApiUri rest_api_uri = 3;

  // Last seen timestamp (unix milliseconds)
  TimeStamp last_seen = 4;

  // Is peer currently online?
  bool is_online = 5;

  // Available runtimes (toolchains)
  repeated Runtime available_runtimes = 7;
}

// QueryCapabilitiesRequest requests peer capabilities
message QueryCapabilitiesRequest {
  // What peer? (empty = self)
  string peer_id = 1;

  // Optional: include detailed runtime info
  bool include_runtime_details = 2;

  // Optional: include cache index
  bool include_cache_info = 3;
}

// BroadcastResponse indicates if broadcast was successful
message BroadcastResponse {
  // Was broadcast successful?
  bool success = 1;

  // Number of peers that received the message
  uint32 peers_reached = 2;

  // Error message if not successful
  string error_message = 3;
}

// CommitScheduleResponse confirms scheduling decision
message CommitScheduleResponse {
  // Job ID
  string job_id = 1;

  // Was scheduling successful?
  bool success = 2;

  // Target peer that will execute the job
  string target_peer_id = 3;

  // Error message if not successful
  string error_message = 4;

  // Timestamp when job will start (estimated)
  TimeStamp estimated_start = 5;
}

// ===== Additional RPC message type aliases =====

// SubmitJobRequest wraps JobSubmissionMessage
message SubmitJobRequest {
  // The job submission message
  JobSubmissionMessage submission = 1;
}

// SubmitJobResponse - renamed from JobStatus
message SubmitJobResponse {
  // Job ID
  string job_id = 1;

  // Client ID of the client who received the job submission
  string submitter_id = 2;

  // Submission timestamp
  TimeStamp submitted_at = 3;

  // Is the job accepted?
  bool accepted = 4;

  // If not accepted, why?
  string error_message = 5;
}

// GetJobStatusResponse - equivalent to JobProgress
message GetJobStatusResponse {
  // Job ID
  string job_id = 1;

  // Current status
  JobProgress progress = 2;
}

// WatchJobStatusRequest - same structure as GetJobStatusRequest
message WatchJobStatusRequest {
  // Job ID
  string job_id = 1;

  // Optional: only return if status changed since this timestamp
  TimeStamp since = 2;
}

// WatchJobStatusResponse - equivalent to JobProgress
message WatchJobStatusResponse {
  // Job ID
  string job_id = 1;

  // Current progress
  JobProgress progress = 2;
}

// ExecuteJobResponse - stream response for ExecuteJob RPC
message ExecuteJobResponse {
  // Job ID
  string job_id = 1;

  // Current progress
  JobProgress progress = 2;
}

// FetchArtifactRequest wraps ArtifactFetchRequestMessage
message FetchArtifactRequest {
  // The artifact fetch request
  ArtifactFetchRequestMessage request = 1;
}

// FetchArtifactResponse wraps ArtifactFetchResponseMessage
message FetchArtifactResponse {
  // The artifact data
  ArtifactFetchResponseMessage response = 1;
}

// AnnounceSelfRequest wraps PeerAnnouncement
message AnnounceSelfRequest {
  // The peer announcement
  PeerAnnouncement announcement = 1;
}

// QueryCapabilitiesResponse - renamed from PeerCapabilities
message QueryCapabilitiesResponse {
  // Peer ID
  string peer_id = 1;

  // Is peer currently online?
  bool is_online = 2;

  // Available runtimes
  repeated Runtime available_runtimes = 4;

  // Resource limits
  ResourceLimit resources = 5;
}

// QueryCacheRequest wraps CacheQueryMessage
message QueryCacheRequest {
  // The cache query
  CacheQueryMessage query = 1;
}

// QueryCacheResponse wraps CacheQueryResponseMessage
message QueryCacheResponse {
  // The query response
  CacheQueryResponseMessage response = 1;
}

// BroadcastCacheAnnouncementRequest wraps CacheAnnouncementMessage
message BroadcastCacheAnnouncementRequest {
  // The cache announcement
  CacheAnnouncementMessage announcement = 1;
}

// BroadcastCacheAnnouncementResponse - wraps BroadcastResponse
message BroadcastCacheAnnouncementResponse {
  // Was broadcast successful?
  bool success = 1;

  // Number of peers that received the message
  uint32 peers_reached = 2;

  // Error message if not successful
  string error_message = 3;
}

// BroadcastErrorRequest wraps JobErrorMessage
message BroadcastErrorRequest {
  // The error message
  JobErrorMessage error = 1;
}

// BroadcastErrorResponse - same as BroadcastResponse
message BroadcastErrorResponse {
  // Was broadcast successful?
  bool success = 1;

  // Number of peers that received the message
  uint32 peers_reached = 2;

  // Error message if not successful
  string error_message = 3;
}

// ProposeScheduleRequest wraps ScheduleDecisionMessage
message ProposeScheduleRequest {
  // The schedule decision
  ScheduleDecisionMessage decision = 1;
}

// ProposeScheduleResponse wraps ScheduleDecisionMessage
message ProposeScheduleResponse {
  // The schedule decision
  ScheduleDecisionMessage decision = 1;
}

// CommitScheduleRequest wraps ScheduleDecisionMessage
message CommitScheduleRequest {
  // The schedule decision to commit
  ScheduleDecisionMessage decision = 1;
}
