syntax = "proto3";

package buildozer.proto.v1;

import "buildozer/proto/v1/job_data.proto";
import "buildozer/proto/v1/runtime.proto";
import "buildozer/proto/v1/vocabulary.proto";

option go_package = "github.com/Manu343726/buildozer/internal/gen/buildozer/proto/v1";

// Job is the generic base for all distributable work.
// Each job has a runtime requirement and input/output specifications.
// The job type is determined by which field in the oneof is set.
message Job {
  // Unique job ID (UUID, generated by client)
  string id = 1;

  // Required runtime for this job
  Runtime runtime = 2;

  // Input data IDs (files, directories, abstract objects)
  // Will be resolved from cache or network before execution
  repeated string input_data_ids = 3;

  // Expected output data IDs (what artifacts this job will produce)
  repeated string expected_output_data_ids = 4;

  // Job-specific parameters (oneof discriminates the job type)
  oneof job_spec {
    CppCompileJob cpp_compile = 10;
    CppLinkJob cpp_link = 11;
    // Future: GoCompileJob go_compile = 12, RustCompileJob rust_compile = 13, etc.
  }

  // SHA256(job_spec_type || runtime_id || input_hashes || recipe_hash)
  // Used for caching: if any peer has output for this hash, return it directly
  Hash content_hash = 20;

  // Source client ID (which client submitted this job)
  string source_client_id = 21;

  // Submission timestamp (unix milliseconds)
  TimeStamp submitted_at = 22;

  // Timeout for job execution
  // If no progress for this duration, job is marked failed
  TimeDuration timeout = 23;

  // Optional: Job dependency IDs (jobs that must complete before this one)
  repeated string dependency_ids = 24;

  // Input data (files, directories, etc.)
  // Included in Job to ensure inputs are not lost when job is passed around
  repeated JobData inputs = 25;
}

// CppCompileJob: Compile source file(s) to object file(s)
// Inputs: source files, compiler args
// Outputs: object files
message CppCompileJob {
  // Source file paths (relative to build root)
  repeated string source_files = 1;

  // Compiler arguments (e.g., "-O3", "-fPIC", "-std=c++17")
  repeated string compiler_args = 2;

  // Include directories (will be passed as -I flags)
  repeated string include_dirs = 3;

  // Define macros (will be passed as -D flags)
  repeated string defines = 4;

  // Output object file path
  string output_file = 5;
}

// CppLinkJob: Link object files to executable or library
// Inputs: object files, libraries
// Outputs: executable or shared/static library
message CppLinkJob {
  // Object file paths (input artifacts from compile jobs)
  repeated string object_files = 1;

  // Library paths to link (-l flags)
  repeated string libraries = 2;

  // Library search directories (-L flags)
  repeated string library_dirs = 3;

  // Linker arguments (e.g., "-Wl,--as-needed")
  repeated string linker_args = 4;

  // Output file path (executable or library)
  string output_file = 5;

  // Whether output is shared library (vs. static or executable)
  bool is_shared_library = 6;
}

// JobProgress represents real-time progress updates during execution
message JobProgress {
  // Job ID
  string job_id = 1;

  // Current status
  enum JobStatus {
    // In queue, waiting to be scheduled
    JOB_STATUS_UNSPECIFIED = 0;
    // All dependencies met, ready to run
    JOB_STATUS_READY = 1;
    // Assigned to a peer
    JOB_STATUS_SCHEDULED = 2;
    // Inputs being transferred to executing peer
    JOB_STATUS_INPUT_TRANSFER = 3;
    // Currently executing
    JOB_STATUS_RUNNING = 4;
    // Execution finished, outputs ready
    JOB_STATUS_COMPLETED = 5;
    // Outputs being transferred back to requesting client
    JOB_STATUS_OUTPUT_TRANSFER = 6;
    // Execution failed
    JOB_STATUS_FAILED = 7;
    // Cancelled by user or due to dependency failure
    JOB_STATUS_CANCELLED = 8;
  }
  JobStatus status = 2;

  // Progress percentage (0-100) for RUNNING status
  Percentage progress_percent = 3;

  // Last status update timestamp (unix milliseconds)
  TimeStamp updated_at = 4;

  // Which peer is executing this job (if SCHEDULED or RUNNING)
  string executing_peer_id = 5;

  // Log output (accumulated)
  string log_output = 6;
}

// JobTimings tracks exact time ranges and durations of job processing through all phases
message JobTimings {
  // Job ID
  string job_id = 1;

  // Phase time ranges: exact period when the job was in each state
  // Time ranges capture start and end times, handling any gaps naturally
  // Time from submission to READY
  TimeRange pending_time_range = 2;
  // Time from READY to SCHEDULED
  TimeRange ready_time_range = 3;
  // Time from SCHEDULED to INPUT_TRANSFER
  TimeRange scheduled_time_range = 4;
  // Time from INPUT_TRANSFER to RUNNING
  TimeRange input_transfer_time_range = 5;
  // Time from RUNNING to COMPLETED
  TimeRange running_time_range = 6;
  // Time from COMPLETED to OUTPUT_TRANSFER
  TimeRange completed_time_range = 7;
  // Time from OUTPUT_TRANSFER to completion
  TimeRange output_transfer_time_range = 8;

  // Terminal state timestamps (if applicable)
  // If a job fails or gets cancelled, these mark when that occurred
  // Job failed (can occur at any phase)
  TimeStamp failed_at = 9;
  // Job cancelled (can occur at any phase)
  TimeStamp cancelled_at = 10;

  // Phase durations: time spent in each state (derived from time ranges)
  // Duration of PENDING phase
  TimeDuration pending_duration = 11;
  // Duration of READY phase
  TimeDuration ready_duration = 12;
  // Duration of SCHEDULED phase
  TimeDuration scheduled_duration = 13;
  // Duration of INPUT_TRANSFER phase
  TimeDuration input_transfer_duration = 14;
  // Duration of RUNNING phase
  TimeDuration running_duration = 15;
  // Duration of OUTPUT_TRANSFER phase
  TimeDuration output_transfer_duration = 16;

  // Total duration from submission to completion
  // End-to-end time from submission to final state
  TimeDuration total_duration = 17;

  // Optional metadata
  // Total elapsed time (includes any gaps)
  TimeDuration wall_clock_duration = 18;
  // Actual execution time (running_duration)
  TimeDuration compute_duration = 19;
}

// JobResult is the final output of a completed or failed job
message JobResult {
  // Job ID
  string job_id = 1;

  // Final status
  enum JobStatus {
    // Successfully completed and outputs fully delivered
    JOB_STATUS_UNSPECIFIED = 0;
    // Execution failed
    JOB_STATUS_FAILED = 1;
    // Cancelled by user or due to dependency failure
    JOB_STATUS_CANCELLED = 2;
  }
  JobStatus status = 2;

  // Output data IDs (artifacts produced by this job)
  repeated string output_data_ids = 3;

  // Full execution log
  string log_output = 4;

  // Error message (if failed)
  string error_message = 5;

  // Which peer executed this job
  string executing_peer_id = 6;

  // Execution start time (unix milliseconds)
  TimeStamp started_at = 7;

  // Execution end time (unix milliseconds)
  TimeStamp completed_at = 8;

  // Runtime used for this execution (for artifact tagging)
  Runtime runtime_used = 9;

  // Exit code (0 = success, non-zero = failure)
  int32 exit_code = 10;
}

// JobDataTransfer tracks data sizes and network I/O metrics
message JobDataTransfer {
  // Total size of all inputs (in bytes)
  Size input_data_size = 1;

  // Total size of all outputs (in bytes)
  Size output_data_size = 2;

  // Total data transferred (inputs + outputs, in bytes)
  Size total_data_transferred = 3;

  // Amount of data fetched from network (vs. local cache)
  Size network_input_size = 4;

  // Amount of data sent to network peers
  Size network_output_size = 5;
}

// JobExecutionMetrics tracks execution details, results, and resource consumption
message JobExecutionMetrics {
  // Which peer executed this job
  string executing_peer_id = 1;

  // Exit code from execution (0 = success, non-zero = failure)
  int32 exit_code = 2;

  // Whether execution completed successfully
  bool success = 3;

  // Standard output (stdout) captured during execution (one line per entry)
  repeated string stdout_lines = 4;

  // Standard error (stderr) captured during execution (one line per entry)
  repeated string stderr_lines = 5;

  // Resource consumption during execution (CPU, memory, disk I/O)
  ResourceUsage resource_usage = 6;
}

// JobStatistics contains timing, resource usage, and performance metrics for a completed job
message JobStatistics {
  // Job ID
  string job_id = 1;

  // Timing information: phase transitions and durations
  JobTimings timings = 2;

  // Data transfer metrics
  JobDataTransfer data_transfer = 3;

  // Cache query statistics and timing metrics
  CacheQueryStatistics cache_query_statistics = 4;

  // Execution metrics, results, and resource consumption
  JobExecutionMetrics execution_metrics = 5;
}

// JobDependency describes a dependency between two jobs
message JobDependency {
  // This job depends on...
  string dependent_job_id = 1;

  // ...producing these output data IDs
  repeated string required_output_data_ids = 2;
}
