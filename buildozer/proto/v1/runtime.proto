syntax = "proto3";

package buildozer.proto.v1;

import "buildozer/proto/v1/vocabulary.proto";

option go_package = "github.com/Manu343726/buildozer/internal/gen/buildozer/proto/v1";

// CppLanguage represents C/C++ language variants
enum CppLanguage {
  // Unspecified C/C++ language
  CPP_LANGUAGE_UNSPECIFIED = 0;
  // C language (ISO C99, C11, C17, etc.)
  CPP_LANGUAGE_C = 1;
  // C++ language (C++11, C++14, C++17, C++20, etc.)
  CPP_LANGUAGE_CPP = 2;
}

// CppCompiler represents C/C++ compiler implementations
enum CppCompiler {
  // Unspecified C/C++ compiler
  CPP_COMPILER_UNSPECIFIED = 0;
  // GCC (GNU Compiler Collection)
  CPP_COMPILER_GCC = 1;
  // Clang (LLVM-based compiler)
  CPP_COMPILER_CLANG = 2;
}

// CpuArchitecture represents target CPU architectures
enum CpuArchitecture {
  // Unspecified architecture
  CPU_ARCHITECTURE_UNSPECIFIED = 0;
  // x86-64 (AMD64, Intel 64-bit)
  CPU_ARCHITECTURE_X86_64 = 1;
  // ARM 64-bit (ARMv8, AArch64)
  CPU_ARCHITECTURE_AARCH64 = 2;
  // ARM 32-bit (ARMv7, ARMv6, ARMv5)
  CPU_ARCHITECTURE_ARM = 3;
}

// CRuntime represents C runtime implementations
enum CRuntime {
  // Unspecified C runtime
  C_RUNTIME_UNSPECIFIED = 0;
  // GNU C Library (glibc) - standard on Linux
  C_RUNTIME_GLIBC = 1;
  // musl libc - lightweight, security-focused C runtime (Alpine Linux)
  C_RUNTIME_MUSL = 2;
}

// CppAbi represents C++ ABI (Application Binary Interface) specifications
enum CppAbi {
  // Unspecified C++ ABI
  CPP_ABI_UNSPECIFIED = 0;
  // Itanium ABI (used by GCC, Clang on Unix-like systems)
  CPP_ABI_ITANIUM = 1;
}

// CppStdlib represents C++ standard library implementations
enum CppStdlib {
  // Unspecified C++ standard library
  CPP_STDLIB_UNSPECIFIED = 0;
  // GCC's libstdc++
  CPP_STDLIB_LIBSTDCXX = 1;
  // LLVM/Clang's libc++
  CPP_STDLIB_LIBCXX = 2;
}

// CppToolchain describes a C/C++ compilation environment
message CppToolchain {
  // Programming language
  CppLanguage language = 1;

  // Compiler implementation
  CppCompiler compiler = 2;

  // Compiler version (e.g., "11.2.0")
  Version compiler_version = 3;

  // Target architecture
  CpuArchitecture architecture = 4;

  // C runtime implementation
  CRuntime c_runtime = 5;

  // C runtime version (e.g., "2.31")
  Version c_runtime_version = 6;

  // C++ ABI specification
  CppAbi cpp_abi = 7;

  // C++ standard library implementation
  CppStdlib cpp_stdlib = 8;

  // ABI modifiers: compiler-specific flags that change the ABI
  // For example, gcc C++11 ABI is enabled with -D_GLIBCXX_USE_CXX11_ABI=1
  repeated string abi_modifiers = 9;
}

// GoToolchain describes a Go compilation environment
message GoToolchain {
  // Go version (e.g., "1.21.0")
  Version go_version = 1;

  // Target OS (e.g., "linux", "darwin", "windows")
  string goos = 2;

  // Target architecture (e.g., "amd64", "arm64")
  string goarch = 3;

  // CGO enabled?
  bool cgo_enabled = 4;
}

// RustToolchain describes a Rust compilation environment
message RustToolchain {
  // Rust version (e.g., "1.75.0")
  Version rust_version = 1;

  // Target triple (e.g., "x86_64-unknown-linux-gnu")
  string target_triple = 2;

  // Edition (e.g., "2021")
  string edition = 3;
}

// Runtime recipe as a dockerfile
message DockerfileRecipe {
  // Lines of the Dockerfile (including FROM and comments)
  repeated string dockerfile_lines = 1;
}

// RuntimeRecipe describes how to build or instantiate a runtime (e.g., Dockerfile).
message RuntimeRecipe {
  oneof recipe {
    DockerfileRecipe dockerfile = 1;
    // Future: other recipe types (e.g., native setup scripts) can be added here
  }

  // SHA256 hash of the recipe content (part of cache key)
  Hash content_hash = 3;
}

// ResourceLimit defines constraints for a single runtime or client.
message ResourceLimit {
  // Max CPU cores (0 = unlimited)
  double max_cpu_cores = 1;

  // Max RAM in bytes (0 = unlimited)
  uint64 max_ram_bytes = 2;

  // Max concurrent jobs (0 = unlimited)
  uint32 max_concurrent_jobs = 3;

  // Optional: Max disk space for cache in bytes (0 = unlimited)
  uint64 max_cache_disk_bytes = 4;
}

// RuntimeLoad represents current load and utilization of a runtime
message RuntimeLoad {
  ResourceUsage resource_usage = 1;
  uint32 running_jobs = 2;
}

// DockerRuntimeMetadata provides information about a Docker-based runtime
message DockerRuntimeMetadata {
  // Image reference (e.g., "docker.io/library/ubuntu:20.04")
  string image = 1;

  // SHA256 digest of the Docker image (used for caching and verification)
  Signature image_digest = 2;

  // Optional: Base image reference (i.e. Ubuntu 20.04, without toolchain or recipe-specific layers)
  optional string base_image = 3;

  // Optional: Dockerfile recipe used to build this image (if available)
  optional DockerfileRecipe recipe = 4;

  // Optional: Runtime metadata of the linux native runtime that this Docker image replicates (if applicable)
  optional LinuxNativeRuntimeMetadata linux_native_equivalent = 5;
}

// LinuxNativeRuntimeMetadata provides information about a native runtime on Linux
message LinuxNativeRuntimeMetadata {
  // Kernel version (e.g., "5.15.0-1051-azure")
  string kernel_version = 1;
  // C library (e.g., "glibc 2.31")
  CRuntime c_library = 2;
  // C library version (e.g., "2.31")
  Version c_library_version = 3;
  // CPU architecture (e.g., "x86_64")
  CpuArchitecture cpu_architecture = 4;
  // Linux distribution (e.g., "Ubuntu 20.04")
  string linux_distribution = 5;
  // Linux distribution version (e.g., "20.04")
  Version linux_distribution_version = 6;
}

// RuntimeMetadata provides information about how to build or replicate a runtime
message RuntimeMetadata {
  oneof metadata {
    DockerRuntimeMetadata docker = 1;
    LinuxNativeRuntimeMetadata linux_native = 2;
  }
}

// Runtime represents an executable environment where jobs run.
// Contains the toolchain specification (C++, Go, Rust, etc.) and resource constraints.
message Runtime {
  // Unique identifier for this runtime (SHA256 of toolchain || recipe || constraints)
  string id = 1;

  // Concrete toolchain specification (oneof discriminates the type)
  oneof toolchain {
    CppToolchain cpp = 10;
    GoToolchain go = 11;
    RustToolchain rust = 12;
    // Future: JavaToolchain java = 13, PythonToolchain python = 14, etc.
  }

  // Optional: Runtime recipe (if not native, or if needs per-job customization)
  optional RuntimeRecipe recipe = 20;

  // Resource constraints for this runtime
  ResourceLimit resource_limit = 21;

  // Optional: Human-readable description
  optional string description = 22;

  // Whether this runtime is available natively on the peer (vs. Docker-only)
  bool is_native = 23;

  // If Docker-based: Docker image digest
  optional Signature docker_image_digest = 24;

  // Current load and utilization of the runtime
  RuntimeLoad load = 25;
}

// RuntimeService provides RPC methods for querying runtimes available on the daemon
service RuntimeService {
  // ListRuntimes returns all runtimes available on this daemon
  rpc ListRuntimes(ListRuntimesRequest) returns (ListRuntimesResponse);

  // GetRuntime returns details about a specific runtime
  rpc GetRuntime(GetRuntimeRequest) returns (GetRuntimeResponse);
}

// ListRuntimesRequest requests the list of available runtimes
message ListRuntimesRequest {
  // Optional: filter by toolchain type (e.g., "cpp", "go", "rust")
  // If empty, returns all runtimes
  optional string toolchain_filter = 1;

  // If true, only return runtimes available on this daemon
  // If false (default), include runtimes from peer daemons in the network
  bool local_only = 2;
}

// ListRuntimesResponse returns the list of available runtimes
message ListRuntimesResponse {
  // All detected runtimes matching the filter
  repeated Runtime runtimes = 1;

  // Human-readable notes about detection (e.g., "Detected 16 C/C++ toolchains")
  string detection_notes = 2;
}

// GetRuntimeRequest requests details about a specific runtime
message GetRuntimeRequest {
  // Runtime ID to query
  string runtime_id = 1;
}

// GetRuntimeResponse returns details about a specific runtime
message GetRuntimeResponse {
  // The requested runtime, or empty if not found
  optional Runtime runtime = 1;

  // Error message if runtime not found
  optional string error = 2;
}
