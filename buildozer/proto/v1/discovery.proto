syntax = "proto3";

package buildozer.proto.v1;

import "buildozer/proto/v1/runtime.proto";
import "buildozer/proto/v1/vocabulary.proto";

option go_package = "github.com/Manu343726/buildozer/internal/gen/buildozer/proto/v1";

// DiscoveryService handles peer discovery and capability advertisement
// This is the P2P service used by clients to discover each other and exchange capabilities
service DiscoveryService {
  // ListPeers returns all known peers discovered via mDNS
  // Used by CLI to display network topology
  rpc ListPeers(ListPeersRequest) returns (ListPeersResponse);

  // TriggerDiscovery triggers an immediate peer discovery cycle
  // Used by CLI to force network discovery
  rpc TriggerDiscovery(TriggerDiscoveryRequest) returns (TriggerDiscoveryResponse);
}

// PeerCapabilities describes what a peer can do
message PeerCapabilities {
  // Number of available CPU cores
  uint32 available_cpu_cores = 1;

  // Available memory (MB)
  uint32 available_memory_mb = 2;

  // Maximum concurrent jobs this peer can execute
  uint32 max_concurrent_jobs = 3;

  // Number of jobs currently running on this peer
  uint32 running_jobs_count = 4;

  // Supported runtimes on this peer
  repeated buildozer.proto.v1.Runtime available_runtimes = 5;

  // Local cache size (MB)
  uint32 cache_size_mb = 6;

  // Maximum cache size this peer can maintain (MB)
  uint32 max_cache_size_mb = 7;
}

// PeerMetadata contains peer version and configuration info
message PeerMetadata {
  // Protocol version supported by this peer
  string protocol_version = 1;

  // Buildozer binary version on this peer
  string buildozer_version = 2;

  // Operating system (Linux, Darwin, Windows)
  string operating_system = 3;

  // Architecture (x86_64, aarch64, etc.)
  string architecture = 4;
}

// PeerInfo contains information about a known peer
message PeerInfo {
  // Unique peer identifier
  string peer_id = 1;

  // Peer hostname
  string hostname = 2;

  // gRPC API endpoint
  buildozer.proto.v1.ApiUri grpc_uri = 3;

  // Optional: REST API endpoint
  buildozer.proto.v1.ApiUri rest_api_uri = 4;

  // Last time this peer announced itself
  buildozer.proto.v1.TimeStamp last_seen = 5;

  // Is this peer currently online/responsive?
  bool is_online = 6;

  // Available runtimes on this peer
  repeated buildozer.proto.v1.Runtime available_runtimes = 7;
}

// ListPeersRequest requests the list of known peers
message ListPeersRequest {
  // Metadata about the requester making this request
  RequesterInfo requester_info = 1;
}

// ListPeersResponse returns all discovered peers
message ListPeersResponse {
  // List of discovered peers
  repeated PeerInfo peers = 1;

  // Number of peers in the list
  int32 count = 2;
}

// TriggerDiscoveryRequest triggers an immediate discovery cycle
message TriggerDiscoveryRequest {
  // Metadata about the requester making this request
  RequesterInfo requester_info = 1;
}

// TriggerDiscoveryResponse confirms discovery was triggered
message TriggerDiscoveryResponse {
  // Status of the discovery trigger
  enum Status {
    SUCCESS = 0;
    ALREADY_RUNNING = 1;
    FAILED = 2;
  }

  // Status message
  string message = 1;

  // Status code
  Status status = 2;
}
